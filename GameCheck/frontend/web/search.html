<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../web/search.css" />
  <title>GameCheck | Search</title>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <!-- Back button -->
    <a href="./hero.html">
      <img class="back-btn"
           src="../svg/searchBackButton.svg"
           alt="Back"
           draggable="false" />
    </a>

    <!-- Centered logo (hexagon icon only) -->
    <div class="header-logo-wrap">
      <img class="header-logo"
           src="../svg/searchHeader.svg"
           alt="GameCheck"
           draggable="false" />
    </div>

    <!-- Right spacer to keep logo perfectly centered -->
    <div class="header-spacer"></div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="search-page-wrapper">

    <!-- Search Shelf (dark rounded-top panel) -->
    <section class="search-shelf">

      <!-- Search Bar -->
      <div class="search-bar-container">
        <input type="text"
               id="searchInput"
               placeholder="Search for games..."
               autocomplete="off" />
        <button class="search-icon-btn" aria-label="Search">
          <!-- Search icon path from searchBar.svg -->
          <svg viewBox="0 0 50 60" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M18.16 2C8.13 2 0 10.31 0 20.56C0 30.82 8.13 39.12 18.16 39.12C22.03 39.12 25.62 37.88 28.57 35.77L39.61 47.05C40.84 48.32 42.84 48.32 44.08 47.05C45.31 45.79 45.31 43.75 44.08 42.49L33.03 31.2C35.1 28.19 36.32 24.52 36.32 20.56C36.32 10.31 28.19 2 18.16 2ZM4.74 20.56C4.74 12.98 10.75 6.84 18.16 6.84C25.57 6.84 31.58 12.98 31.58 20.56C31.58 28.14 25.57 34.28 18.16 34.28C10.75 34.28 4.74 28.14 4.74 20.56Z"/>
          </svg>
        </button>
      </div>

      <!-- Filters -->
      <div class="filters-container">
        <span class="filters-label">Search Filters:</span>

        <select id="filterPlatform" class="dropdown-pill">
          <option value="all">All</option>
          <option value="Nintendo Switch">Nintendo Switch</option>
          <option value="Nintendo Switch 2">Nintendo Switch 2</option>
        </select>

        <select id="filterFormat" class="dropdown-pill">
          <option value="all">All</option>
          <option value="physical">Physical</option>
          <option value="digital">Digital</option>
        </select>
      </div>

    </section>

    <!-- Results Section -->
    <section class="results-section">
      <div class="results-header">
        <h3 class="results-title">Search Results:</h3>
        <span class="results-count" id="resultsCount"></span>
      </div>

      <p id="loadingText" style="display: none; text-align: center; padding: 20px;">Loading games...</p>
      <div class="results-grid" id="resultsGrid"></div>

      <div class="pagination" id="pagination"></div>
    </section>

  </main>

  <script src ="../web/search.js"> </script>
    
</body>
</html>
