spring.application.name=gamecheck
spring.config.import=optional:classpath:application-local.properties

# Database — override locally via application-local.properties or env vars (Supabase).
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT — set APP_JWT_SECRET (min 32 bytes for HS256) or app.jwt.secret in application-local.properties
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# ExchangeRate-API (v6) — set APP_FOREX_API_KEY in the environment (do not commit keys).
app.forex.api-key=${APP_FOREX_API_KEY:}
app.forex.base-url=https://v6.exchangerate-api.com

spring.datasource.url=${SPRING_DATASOURCE_URL}?prepareThreshold=0