# Production Configuration for Railway Deployment
# All sensitive values are read from Railway environment variables

spring.application.name=gamecheck

# Database — Railway environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# Forex API Configuration
app.forex.api-key=${APP_FOREX_API_KEY}
app.forex.base-url=https://v6.exchangerate-api.com

# Scraper Configuration
scraper.url-cap=${SCRAPER_URL_CAP:10}

# Server Configuration
server.port=${PORT:8080}
